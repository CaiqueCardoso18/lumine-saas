version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumine-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumine_dev
      POSTGRES_USER: lumine
      POSTGRES_PASSWORD: lumine_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumine -d lumine_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
    driver: local
